# Builds the multi-arch images, smoke-tests the stack, and scans for vulnerabilities.
name: Build, Test, and Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 5 * * 5"
  workflow_dispatch: {}

# Cancel superseded runs for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal by default; the scan job widens its own scope below.
permissions:
  contents: read

env:
  APP_BASE_DIR: "./app"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build multi-architecture images natively
  build:
    name: Build (${{ matrix.platform }} - ${{ matrix.target }})
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            target: app
          - platform: linux/amd64
            runner: ubuntu-latest
            target: web
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            target: app
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            target: web
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Demo App
        env:
          PLATFORM: ${{ matrix.platform }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          docker pull --platform "$PLATFORM" composer:2
          docker run --rm --platform "$PLATFORM" \
            -v "$WORKSPACE":/app \
            -w /app \
            composer:2 create-project \
            --no-install --no-scripts \
            symfony/symfony-demo app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: ${{ matrix.platform }}
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: kubephp-${{ matrix.target }}:test
          build-args: |
            APP_BASE_DIR=${{ env.APP_BASE_DIR }}
            BUILDPLATFORM=${{ matrix.platform }}
            TARGETPLATFORM=${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}-${{ matrix.target }}

      - name: Test the App Startup
        if: matrix.target == 'app'
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          docker run -d --name test-app --platform "$PLATFORM" kubephp-app:test
          sleep 5
          docker exec test-app php -v
          docker exec test-app php -m
          docker stop test-app
          docker rm test-app

  # Test the full stack on both AMD64 and ARM64 natively
  integration-test:
    name: Integration Test (${{ matrix.platform }})
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Demo App
        env:
          PLATFORM: ${{ matrix.platform }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          docker pull --platform "$PLATFORM" composer:2
          docker run --rm --platform "$PLATFORM" \
            -v "$WORKSPACE":/app \
            -w /app \
            composer:2 create-project \
            --no-install --no-scripts \
            symfony/symfony-demo app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Mirrors `mise run deploy` (kept inline so this job doesn't install the lint toolchain).
      - name: Build & Deploy
        run: docker compose -f docker-compose.prod.yml up --build -d

      - name: Wait for services to be ready
        run: |
          timeout=60
          elapsed=0
          while ! curl -f http://localhost:8080 >/dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "Service failed to start within $timeout seconds"
              docker compose -f docker-compose.prod.yml logs
              exit 1
            fi
            echo "Waiting for service... ($elapsed/$timeout seconds)"
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "Service is ready!"

      - name: Test the App Startup
        run: |
          curl -f http://localhost:8080 -I
          curl -f http://localhost:8080 -s | head -50

  # Security scanning on both architectures
  security-scan:
    name: Security Scan (${{ matrix.platform }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: build
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Demo App
        env:
          PLATFORM: ${{ matrix.platform }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          docker pull --platform "$PLATFORM" composer:2
          docker run --rm --platform "$PLATFORM" \
            -v "$WORKSPACE":/app \
            -w /app \
            composer:2 create-project \
            --no-install --no-scripts \
            symfony/symfony-demo app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build app image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: ${{ matrix.platform }}
          target: app
          push: false
          load: true
          tags: kubephp-app:scan
          build-args: |
            APP_BASE_DIR=${{ env.APP_BASE_DIR }}
            BUILDPLATFORM=${{ matrix.platform }}
            TARGETPLATFORM=${{ matrix.platform }}
          cache-from: type=gha,scope=scan-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=scan-${{ matrix.platform }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # v0.34.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # auth trivy DB pulls to dodge anonymous rate limits
        with:
          # Pin a real Trivy: this trivy-action release hardcodes v0.69.1, which doesn't exist (404).
          version: v0.71.2
          image-ref: kubephp-app:scan
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          scanners: "vuln,secret"
          exit-code: "0"
          # The template doesn't install PHP; vendored packages here come from the demo
          # app (not part of this repo), so skip them. `skip-dirs` is the supported input
          # (the old `trivy-args`/`--skip-packages` are not valid trivy-action inputs).
          skip-dirs: "/app/vendor"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          wait-for-processing: true
